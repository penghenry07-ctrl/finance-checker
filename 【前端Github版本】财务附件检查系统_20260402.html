<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>财务附件检查系统 V20250811</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy:#0f1e35; --navy2:#162844; --blue:#1a6fbe; --blue-light:#2d8eed;
  --border:#dde3ea; --text:#1a2535; --muted:#6b7c93; --gray:#f4f6f8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#eef2f7;color:var(--text);min-height:100vh}

.app-header{background:var(--navy);padding:18px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.app-header .logo{font-size:26px}
.app-header h1{color:#fff;font-size:18px;font-weight:700}
.app-header p{color:#8fa8c8;font-size:12px;margin-top:2px}

.main{max-width:960px;margin:0 auto;padding:28px 16px}

.upload-zone{background:#fff;border:2.5px dashed var(--blue-light);border-radius:14px;padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-zone.drag-over{border-color:#f59e0b;background:#fffbf3}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .upload-icon{font-size:48px;margin-bottom:12px}
.upload-zone h2{font-size:17px;margin-bottom:6px}
.upload-zone p{font-size:13px;color:var(--muted);line-height:1.6}
.upload-zone .hint{margin-top:14px;font-size:12px;color:var(--blue);background:#eef6ff;padding:8px 14px;border-radius:20px;display:inline-block}

.file-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.file-tag{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px}
.file-tag .name{flex:1;font-weight:500}
.file-tag .sz{font-size:12px;color:var(--muted)}
.file-tag .rm{cursor:pointer;color:#c0392b;font-size:20px;line-height:1}

.btn-run{display:block;width:100%;margin-top:20px;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .2s}
.btn-run:hover{background:var(--navy2)}
.btn-run:disabled{background:#bbb;cursor:not-allowed}

.progress{margin-top:16px;display:none}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue-light);border-radius:3px;transition:width .3s}
.progress-text{text-align:center;font-size:13px;color:var(--muted);margin-top:6px}

#report{margin-top:28px}

/* Download bar */
.download-bar{margin-top:20px;background:#fff;border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.download-bar p{font-size:13px;color:var(--muted)}
.btn-dl{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer}
.btn-dl:hover{background:var(--blue-light)}

.spacer{height:60px}
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">📊</div>
  <div>
    <h1>财务附件自动检查系统</h1>
    <p>V20250811 · 85条规则 · 携程/美团/飞猪/抖音/直销汇总</p>
  </div>
</div>

<div class="main">
  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
    <div class="upload-icon">📂</div>
    <h2>点击或拖入附件 Excel 文件</h2>
    <p>支持同时导入多个文件（附件1、附件2、附件3…）<br>文件名应包含年月，如：附件1 百扬项目-OTA房费收入明细2025.09.xlsx</p>
    <span class="hint">💡 文件仅在本地浏览器处理，不会上传至任何服务器</span>
  </div>
  <div class="file-list" id="fileList"></div>
  <button class="btn-run" id="btnRun" disabled>开始检查</button>
  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">准备中…</div>
  </div>
  <div id="report"></div>
  <div class="spacer"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 配置（与原 Python 脚本完全一致）
// ═══════════════════════════════════════════════════════════════
const Y_VALUES = {'英利':600,'联合国际':350,'世茂':600,'百扬':500,'光控':500,'盈嘉':650,'未来中心':350};

const CRITICAL_RULES = new Set([5,7,8,9,10,11,12,15,18,23,25,26,27,28,31,34,
  39,41,42,43,44,49,54,55,56,57,58,64,69,70,71,72,73,74,75,76,77,80,81,82,83,84,85]);
const MINOR_RULES = new Set([16,17,32,33,48,63,65,79]);

function getErrClass(rn) {
  if (CRITICAL_RULES.has(rn)) return 'critical';
  if (MINOR_RULES.has(rn)) return 'minor';
  return 'normal';
}

// ═══════════════════════════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════════════════════════
function toNum(v) {
  if (v === null || v === undefined || v === '') return NaN;
  if (typeof v === 'boolean') return NaN;
  if (typeof v === 'number') return v;
  const n = Number(String(v).replace(/,/g,'').trim());
  return n;
}

// 将 Excel 单元格原始值转为 Date（纯日期，无时间）
function toDate(v) {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'number') {
    // Excel 序列日期
    try {
      const d = XLSX.SSF.parse_date_code(v);
      if (d && d.y >= 1900) return new Date(d.y, d.m-1, d.d);
    } catch(e){}
    return null;
  }
  if (typeof v === 'string') {
    const s = v.trim();
    let m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
    if (m) return new Date(+m[1], +m[2]-1, +m[3]);
    m = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if (m) return new Date(+m[1], +m[2]-1, +m[3]);
    const d = new Date(s);
    if (!isNaN(d.getTime())) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  }
  if (v instanceof Date && !isNaN(v.getTime())) return new Date(v.getFullYear(), v.getMonth(), v.getDate());
  return null;
}

function norm(d) { return d ? new Date(d.getFullYear(),d.getMonth(),d.getDate()) : null; }
function dateEq(a,b) { return a && b && norm(a).getTime()===norm(b).getTime(); }
function dateLT(a,b) { return a && b && norm(a).getTime()<norm(b).getTime(); }
function daysInMonth(y,m) { return new Date(y,m,0).getDate(); } // m is 1-based
function nextMonthFirst(y,m) { return new Date(y, m-1+1, 1); } // first day of next month
function fmtDate(d) { if(!d)return'?'; return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateCN(d) { if(!d)return'?'; return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }
function s(v) { return v===null||v===undefined?'':String(v); }

function getYValue(fn) { for(const[k,v] of Object.entries(Y_VALUES)) if(fn.includes(k)) return v; return 350; }
function extractYM(fn) { const m=fn.match(/(\d{4})\.(\d{2})/); return m?[+m[1],+m[2]]:[null,null]; }

// rows[r][c], null if out of bounds
function rc(rows,r,c) {
  if(r<0||r>=rows.length) return null;
  const row=rows[r];
  if(!row||c<0||c>=row.length) return null;
  const v=row[c];
  return v===undefined?null:v;
}

// ═══════════════════════════════════════════════════════════════
// 空行检查（通用）
// ═══════════════════════════════════════════════════════════════
function checkEmptyRows(rows, sheetName, ruleNum, errors) {
  for (let i=1; i<rows.length; i++) {
    const row=rows[i];
    const empty=!row||row.every(v=>v===null||v===undefined||v==='');
    if (empty) {
      let hasAfter=false;
      for (let j=i+1;j<rows.length;j++){
        const nr=rows[j];
        if(nr&&nr.some(v=>v!==null&&v!==undefined&&v!=='')){ hasAfter=true; break; }
      }
      if(hasAfter){
        errors.push({rn:ruleNum, sheet:sheetName, msg:`第<strong>${i+2}</strong>行为空行，但其后还有数据`});
        return i;
      }
    }
  }
  return -1;
}

// ═══════════════════════════════════════════════════════════════
// 重复值帮助函数（对应 pandas duplicated(keep=False)）
// 返回 { val -> [rowNums...] }，仅包含出现>=2次的值
// ═══════════════════════════════════════════════════════════════
function findDuplicates(rows, colIdx, startRow, filterFn) {
  const map={};
  for(let i=startRow;i<rows.length;i++){
    const v=rc(rows,i,colIdx);
    if(v===null||v===undefined||v==='') continue;
    if(filterFn && !filterFn(v)) continue;
    const key=String(v);
    if(!map[key]) map[key]=[];
    map[key].push(i+1); // Excel行号
  }
  const result={};
  for(const[k,arr] of Object.entries(map)) if(arr.length>=2) result[k]=arr;
  return result;
}

// ═══════════════════════════════════════════════════════════════
// 携程表（规则 1-18, 83）
// ═══════════════════════════════════════════════════════════════
function checkXiecheng(rows, filename, sheetName) {
  const errors=[];
  const [year,month]=extractYM(filename);
  const yv=getYValue(filename);

  // 规则18：空行检查
  const cut=checkEmptyRows(rows,sheetName,18,errors);
  if(cut>=0) rows=rows.slice(0,cut);
  const n=rows.length;

  try{
    // 规则1：B列(1)重复值，比较C列(2)和G列(6)
    const bMap=findDuplicates(rows,1,1,null);
    for(const[val,excelRows] of Object.entries(bMap)){
      const indices=excelRows.map(r=>r-1); // 0-based
      const cVals=indices.map(i=>s(rc(rows,i,2)));
      const allCSame=cVals.every(v=>v===cVals[0]);
      const rowStr=excelRows.join(', ');
      if(!allCSame){
        errors.push({rn:1,sheet:sheetName,msg:`B列第<strong>${rowStr}</strong>行重复值'${val}'对应的C列内容不一致`});
      } else if(indices.length===2){
        const g0=toNum(rc(rows,indices[0],6)), g1=toNum(rc(rows,indices[1],6));
        if(!isNaN(g0)&&!isNaN(g1)&&!(g0*g1<0))
          errors.push({rn:1,sheet:sheetName,msg:`B列第<strong>${rowStr}</strong>行重复值'${val}'对应的G列数字不是一正一负`});
      }
    }

    // 规则2：E列(4)第2行是当月第一天
    if(year&&month){
      const e2=toDate(rc(rows,1,4));
      const fd=new Date(year,month-1,1);
      if(!e2||!dateEq(e2,fd))
        errors.push({rn:2,sheet:sheetName,msg:`<strong>E2</strong>单元格应为${year}年${String(month).padStart(2,'0')}月01日，实际为${e2?fmtDate(e2):'空值'}`});
    }

    // 规则3：E列日期检查
    const colE=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,4));if(d) colE.push({d,i});}
    if(colE.length>0&&year&&month){
      // 递增
      for(let i=1;i<colE.length;i++){
        if(dateLT(colE[i].d,colE[i-1].d)){
          errors.push({rn:3,sheet:sheetName,msg:`E列第<strong>${colE[i].i+1}</strong>行日期(${fmtDate(colE[i].d)})早于第<strong>${colE[i-1].i+1}</strong>行(${fmtDate(colE[i-1].d)})`}); break;
        }
      }
      // 缺日期
      const dim=daysInMonth(year,month);
      const exp=new Set(); for(let d=1;d<=dim;d++) exp.add(new Date(year,month-1,d).getTime());
      const act=new Set(colE.map(e=>norm(e.d).getTime()));
      const miss=[...exp].filter(t=>!act.has(t)).map(t=>new Date(t));
      if(miss.length>0) errors.push({rn:3,sheet:sheetName,msg:`E列缺少当月日期：${miss.sort((a,b)=>a-b).map(d=>d.getDate()+'日').join(', ')}`});
      // 最后一行
      const ld=new Date(year,month-1,dim);
      if(!dateEq(norm(colE[colE.length-1].d),ld)) errors.push({rn:3,sheet:sheetName,msg:`E列最后一行应为当月最后一天${fmtDateCN(ld)}`});
      // 非当月
      for(const{d,i} of colE){
        if(d.getFullYear()!==year||d.getMonth()+1!==month){errors.push({rn:3,sheet:sheetName,msg:`E列第<strong>${i+1}</strong>行包含非当月日期：${fmtDateCN(d)}`});break;}
      }
    }

    // 规则4：F列(5)日期检查
    const colF=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,5));if(d) colF.push({d,i});}
    if(colF.length>0&&year&&month){
      const nmf=nextMonthFirst(year,month);
      if(!dateEq(norm(colF[colF.length-1].d),nmf)) errors.push({rn:4,sheet:sheetName,msg:`F列最后一行应为次月第一天${fmtDateCN(nmf)}`});
      for(let k=0;k<colF.length-1;k++){
        const{d,i}=colF[k];
        if((d.getFullYear()===year&&d.getMonth()+1===month)||dateEq(norm(d),nmf)) continue;
        errors.push({rn:4,sheet:sheetName,msg:`<strong>F${i+1}</strong>包含非法日期：${fmtDateCN(d)}`}); break;
      }
    }

    // 规则5：F日期早于E
    for(let i=1;i<n;i++){
      const e=toDate(rc(rows,i,4)),f=toDate(rc(rows,i,5));
      if(e&&f&&dateLT(f,e)) errors.push({rn:5,sheet:sheetName,msg:`第<strong>${i+1}</strong>行F列日期早于E列日期`});
    }

    // 规则6：G列(6)>7
    {const ov=[];for(let i=1;i<n;i++){const g=toNum(rc(rows,i,6));if(!isNaN(g)&&g>7)ov.push(i+1);}
    if(ov.length>0) errors.push({rn:6,sheet:sheetName,msg:`G列存在大于7的数值，行号：<strong>${ov.join(', ')}</strong>`});}

    // 规则7：H列(7)倒数第二行求和
    {const col=[]; for(let i=0;i<n;i++) col.push(toNum(rc(rows,i,7)));
    if(n>2){let s=0;for(let i=1;i<=n-3;i++)if(!isNaN(col[i]))s+=col[i];
    const a=col[n-2];if(!isNaN(a)&&Math.abs(s-a)>0.01) errors.push({rn:7,sheet:sheetName,msg:`H列倒数第二行求和错误，应为${s.toFixed(2)}，实际为${a.toFixed(2)}`});}}

    // 规则8：I列(8)最后一行求和（跳过标题，不包括最后一行）
    {const col=[]; for(let i=0;i<n;i++) col.push(toNum(rc(rows,i,8)));
    if(n>1){let s=0;for(let i=1;i<=n-2;i++)if(!isNaN(col[i]))s+=col[i];
    const a=col[n-1];if(!isNaN(a)&&Math.abs(s-a)>0.01) errors.push({rn:8,sheet:sheetName,msg:`I列最后一行求和错误，应为${s.toFixed(2)}，实际为${a.toFixed(2)}`});}}

    // 规则9：J列(9)倒数第二行求和
    {const col=[]; for(let i=0;i<n;i++) col.push(toNum(rc(rows,i,9)));
    if(n>2){let s=0;for(let i=1;i<=n-3;i++)if(!isNaN(col[i]))s+=col[i];
    const a=col[n-2];if(!isNaN(a)&&Math.abs(s-a)>0.01) errors.push({rn:9,sheet:sheetName,msg:`J列倒数第二行求和错误，应为${s.toFixed(2)}，实际为${a.toFixed(2)}`});}}

    // 规则10：K列(10)倒数第二行求和
    {const col=[]; for(let i=0;i<n;i++) col.push(toNum(rc(rows,i,10)));
    if(n>2){let s=0;for(let i=1;i<=n-3;i++)if(!isNaN(col[i]))s+=col[i];
    const a=col[n-2];if(!isNaN(a)&&Math.abs(s-a)>0.01) errors.push({rn:10,sheet:sheetName,msg:`K列倒数第二行求和错误，应为${s.toFixed(2)}，实际为${a.toFixed(2)}`});}}

    // 规则11-12：I列最后一行值判断
    if(n>2){
      const iLast=toNum(rc(rows,n-1,8));
      const jSL=toNum(rc(rows,n-2,9)), kSL=toNum(rc(rows,n-2,10)), hSL=toNum(rc(rows,n-2,7));
      if(!isNaN(iLast)&&!isNaN(jSL)&&!isNaN(kSL)&&!isNaN(hSL)){
        if(Math.abs(iLast)<0.01){ // 规则11：I最后行≈0
          if(Math.abs((jSL+kSL)-hSL)>0.01) errors.push({rn:11,sheet:sheetName,msg:`J列倒数第二行(${jSL.toFixed(2)})+K列倒数第二行(${kSL.toFixed(2)})≠H列倒数第二行(${hSL.toFixed(2)})`});
        } else { // 规则12
          if(Math.abs((jSL+kSL)-(hSL+iLast))>0.01) errors.push({rn:12,sheet:sheetName,msg:`J列倒数第二行+K列倒数第二行≠H列倒数第二行+I列最后一行`});
        }
      }
    }

    // 规则13：佣金比例 J倒2/H倒2 in [0.05,0.12]
    if(n>2){
      const j=toNum(rc(rows,n-2,9)), h=toNum(rc(rows,n-2,7));
      if(!isNaN(j)&&!isNaN(h)&&h!==0){const r=j/h;if(r<0.05||r>0.12) errors.push({rn:13,sheet:sheetName,msg:`J列倒数第二行÷H列倒数第二行=${r.toFixed(4)}，不在0.05-0.12范围内`});}
    }

    // 规则14：G<0 且 H>-300，D列需含单早/双早
    for(let i=1;i<n;i++){
      const g=toNum(rc(rows,i,6)), h=toNum(rc(rows,i,7));
      if(!isNaN(g)&&g<0&&!isNaN(h)&&h>-300){
        const d=s(rc(rows,i,3));
        if(!d.includes('单早')&&!d.includes('双早')) errors.push({rn:14,sheet:sheetName,msg:`第<strong>${i+1}</strong>行G列为负数且H列>${-300}，但D列不含'单早'或'双早'`});
      }
    }

    // 规则15：G<0 且 H<=-300，M列无早餐词，则找C列同名行有无对应正H
    for(let i=1;i<n;i++){
      const g=toNum(rc(rows,i,6)), h=toNum(rc(rows,i,7));
      if(!isNaN(g)&&g<0&&!isNaN(h)&&h<=-300){
        const m=s(rc(rows,i,12));
        if(m.includes('早餐')||m.includes('双早')||m.includes('单早')) continue;
        const cVal=s(rc(rows,i,2)), xVal=Math.abs(h);
        let found=false;
        for(let j=1;j<n;j++){
          if(i!==j&&s(rc(rows,j,2))===cVal){const oh=toNum(rc(rows,j,7));if(!isNaN(oh)&&Math.abs(oh-xVal)<0.01){found=true;break;}}
        }
        if(!found) errors.push({rn:15,sheet:sheetName,msg:`第<strong>${i+1}</strong>行G列为负数且H列≤${-300}，但未找到对应的正数金额`});
      }
    }

    // 规则16：J<=-100 且 G>0，M列和N列都不含'无误'
    for(let i=1;i<n;i++){
      const j=toNum(rc(rows,i,9)), g=toNum(rc(rows,i,6));
      if(!isNaN(j)&&j<=-100&&!isNaN(g)&&g>0){
        const m=s(rc(rows,i,12)), nv=s(rc(rows,i,13));
        if(!m.includes('无误')&&!nv.includes('无误')) errors.push({rn:16,sheet:sheetName,msg:`第<strong>${i+1}</strong>行J列≤${-100}且G列>0，但M列和N列都不含'无误'`});
      }
    }

    // 规则17：K/G >= Y，排除钟点房/早餐/过时取消/K<0
    for(let i=1;i<n;i++){
      const k=toNum(rc(rows,i,10)), g=toNum(rc(rows,i,6));
      const d=s(rc(rows,i,3)), m=s(rc(rows,i,12)), a=s(rc(rows,i,0));
      if(d.includes('钟点房')||m.includes('早餐')||a.includes('过时取消')) continue;
      if(!isNaN(k)&&k<0) continue;
      if(!isNaN(k)&&!isNaN(g)&&g!==0&&k/g<yv) errors.push({rn:17,sheet:sheetName,msg:`第<strong>${i+1}</strong>行K列÷G列=${(k/g).toFixed(2)}，低于阈值${yv}`});
    }

    // 规则83：(F-E).days == G，带两个特殊情况
    if(n>3){
      for(let i=1;i<=n-3;i++){
        const e=toDate(rc(rows,i,4)), f=toDate(rc(rows,i,5));
        const g=toNum(rc(rows,i,6));
        if(!e||!f||isNaN(g)) continue;
        const diff=Math.round((norm(f)-norm(e))/86400000);
        if(Math.abs(diff-g)<=0.01) continue;
        // 特殊1：G<0 且 K<0，(F-E)==-G，C列有重复
        if(g<0){
          const k=toNum(rc(rows,i,10));
          if(!isNaN(k)&&k<0&&Math.abs(diff-(-g))<0.01){
            const cVal=s(rc(rows,i,2));
            let cnt=0; for(let j=1;j<n;j++) if(s(rc(rows,j,2))===cVal) cnt++;
            if(cnt>1) continue;
          }
        }
        // 特殊2：diff==0 且 G==1 且 D含钟点房
        if(diff===0&&Math.abs(g-1)<0.01&&s(rc(rows,i,3)).includes('钟点房')) continue;
        errors.push({rn:83,sheet:sheetName,msg:`第<strong>${i+1}</strong>行(F列-E列)=${diff}天，不等于G列值${g}`});
      }
    }

  }catch(e){ errors.push({rn:82,sheet:sheetName,msg:`运行错误：${e.message}`}); }
  return errors;
}

// ═══════════════════════════════════════════════════════════════
// 美团表（规则 19-34, 84）
// ═══════════════════════════════════════════════════════════════
function checkMeituan(rows, filename, sheetName) {
  const errors=[];
  const [year,month]=extractYM(filename);
  const yv=getYValue(filename);

  const cut=checkEmptyRows(rows,sheetName,34,errors);
  if(cut>=0) rows=rows.slice(0,cut);
  const n=rows.length;

  try{
    // 规则19：A列(0)重复值（pandas duplicated(keep=False)：出现>=2次才报）
    const aMap=findDuplicates(rows,0,1,null);
    for(const[val,excelRows] of Object.entries(aMap)){
      errors.push({rn:19,sheet:sheetName,msg:`A列第<strong>${excelRows.join(', ')}</strong>行存在重复值：${val}`});
    }

    // 规则20：C列(2)第2行是当月第一天
    if(year&&month){
      const c2=toDate(rc(rows,1,2));
      const fd=new Date(year,month-1,1);
      if(!c2||!dateEq(c2,fd)) errors.push({rn:20,sheet:sheetName,msg:`<strong>C2</strong>单元格应为${year}年${String(month).padStart(2,'0')}月01日`});
    }

    // 规则21：C列日期（递增+完整月份+最后一天）
    const colC=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,2));if(d) colC.push({d,i});}
    if(colC.length>0&&year&&month){
      for(let i=1;i<colC.length;i++){
        if(dateLT(colC[i].d,colC[i-1].d)){errors.push({rn:21,sheet:sheetName,msg:`C列第<strong>${colC[i].i+1}</strong>行日期早于第<strong>${colC[i-1].i+1}</strong>行`});break;}
      }
      const dim=daysInMonth(year,month);
      const exp=new Set(); for(let d=1;d<=dim;d++) exp.add(new Date(year,month-1,d).getTime());
      const act=new Set(colC.map(e=>norm(e.d).getTime()));
      const miss=[...exp].filter(t=>!act.has(t)).map(t=>new Date(t));
      if(miss.length>0) errors.push({rn:21,sheet:sheetName,msg:`C列缺少当月日期：${miss.sort((a,b)=>a-b).map(d=>d.getDate()+'日').join(', ')}`});
      const ld=new Date(year,month-1,dim);
      if(!dateEq(norm(colC[colC.length-1].d),ld)) errors.push({rn:21,sheet:sheetName,msg:`C列最后一行应为当月最后一天`});
    }

    // 规则22：D列(3)日期
    const colD=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,3));if(d) colD.push({d,i});}
    if(colD.length>0&&year&&month){
      const nmf=nextMonthFirst(year,month);
      if(!dateEq(norm(colD[colD.length-1].d),nmf)) errors.push({rn:22,sheet:sheetName,msg:`D列最后一行应为次月第一天`});
      for(let k=0;k<colD.length-1;k++){
        const{d,i}=colD[k];
        if((d.getFullYear()===year&&d.getMonth()+1===month)||dateEq(norm(d),nmf)) continue;
        errors.push({rn:22,sheet:sheetName,msg:`<strong>D${i+1}</strong>包含非法日期`}); break;
      }
    }

    // 规则23：D日期早于C
    for(let i=1;i<=Math.min(colC.length,colD.length);i++){
      const c=toDate(rc(rows,i,2)), d=toDate(rc(rows,i,3));
      if(c&&d&&dateLT(d,c)) errors.push({rn:23,sheet:sheetName,msg:`第<strong>${i+1}</strong>行D列日期早于C列日期`});
    }

    // 规则24：G列(6)>7
    {const ov=[];for(let i=1;i<n;i++){const g=toNum(rc(rows,i,6));if(!isNaN(g)&&g>7)ov.push(i+1);}
    if(ov.length>0) errors.push({rn:24,sheet:sheetName,msg:`G列存在大于7的数值，行号：<strong>${ov.join(', ')}</strong>`});}

    // 规则25-27：H/I/J倒数第二行求和
    for(const[ci,lbl,rn] of [[7,'H',25],[8,'I',26],[9,'J',27]]){
      const col=[];for(let i=0;i<n;i++) col.push(toNum(rc(rows,i,ci)));
      if(n>2){let s=0;for(let i=1;i<=n-3;i++)if(!isNaN(col[i]))s+=col[i];
      const a=col[n-2];if(!isNaN(a)&&Math.abs(s-a)>0.01) errors.push({rn,sheet:sheetName,msg:`${lbl}列倒数第二行求和错误`});}
    }

    // 规则28：I+J==H（倒数第二行）
    if(n>2){
      const h=toNum(rc(rows,n-2,7)), iv=toNum(rc(rows,n-2,8)), j=toNum(rc(rows,n-2,9));
      if(!isNaN(h)&&!isNaN(iv)&&!isNaN(j)&&Math.abs((iv+j)-h)>0.01) errors.push({rn:28,sheet:sheetName,msg:`I列倒数第二行+J列倒数第二行≠H列倒数第二行`});
    }

    // 规则29：佣金比例 I/H in [0.05,0.12]
    if(n>2){
      const h=toNum(rc(rows,n-2,7)), iv=toNum(rc(rows,n-2,8));
      if(!isNaN(h)&&!isNaN(iv)&&h!==0){const r=iv/h;if(r<0.05||r>0.12) errors.push({rn:29,sheet:sheetName,msg:`佣金比例${r.toFixed(4)}不在0.05-0.12范围内`});}
    }

    // 规则30：G<0 且 H>-300，L列需含早餐词
    for(let i=1;i<n;i++){
      const g=toNum(rc(rows,i,6)), h=toNum(rc(rows,i,7));
      if(!isNaN(g)&&g<0&&!isNaN(h)&&h>-300){
        const l=s(rc(rows,i,11));
        if(!l.includes('单早')&&!l.includes('双早')&&!l.includes('早餐')) errors.push({rn:30,sheet:sheetName,msg:`第<strong>${i+1}</strong>行G列为负数且H列>${-300}，但L列不含早餐相关字样`});
      }
    }

    // 规则31：G<0 且 H<=-300，找F列同名行有无对应正H
    for(let i=1;i<n;i++){
      const g=toNum(rc(rows,i,6)), h=toNum(rc(rows,i,7));
      if(!isNaN(g)&&g<0&&!isNaN(h)&&h<=-300){
        const fVal=s(rc(rows,i,5)), xVal=Math.abs(h);
        let found=false;
        for(let j=1;j<n;j++){
          if(i!==j&&s(rc(rows,j,5))===fVal){const oh=toNum(rc(rows,j,7));if(!isNaN(oh)&&Math.abs(oh-xVal)<0.01){found=true;break;}}
        }
        if(!found) errors.push({rn:31,sheet:sheetName,msg:`第<strong>${i+1}</strong>行未找到对应的正数金额`});
      }
    }

    // 规则32：I<=-100 且 G>0，L列需含'无误'
    for(let i=1;i<n;i++){
      const iv=toNum(rc(rows,i,8)), g=toNum(rc(rows,i,6));
      if(!isNaN(iv)&&iv<=-100&&!isNaN(g)&&g>0){
        const l=s(rc(rows,i,11));
        if(!l.includes('无误')) errors.push({rn:32,sheet:sheetName,msg:`第<strong>${i+1}</strong>行I列≤${-100}且G列>0，但L列不含'无误'`});
      }
    }

    // 规则33：J/G >= Y，排除住3/4小时，J==-0.1
    for(let i=1;i<n;i++){
      const j=toNum(rc(rows,i,9)), g=toNum(rc(rows,i,6));
      const e=s(rc(rows,i,4));
      if(e.includes('住3小时')||e.includes('住4小时')) continue;
      if(!isNaN(j)&&Math.abs(j+0.1)<0.01) continue;
      if(!isNaN(j)&&!isNaN(g)&&g!==0&&j/g<yv) errors.push({rn:33,sheet:sheetName,msg:`第<strong>${i+1}</strong>行J列÷G列=${(j/g).toFixed(2)}，低于阈值${yv}`});
    }

    // 规则84：(D-C).days == G，两个特殊情况
    if(n>3){
      for(let i=1;i<=n-3;i++){
        const c=toDate(rc(rows,i,2)), d=toDate(rc(rows,i,3));
        const g=toNum(rc(rows,i,6));
        if(!c||!d||isNaN(g)) continue;
        const diff=Math.round((norm(d)-norm(c))/86400000);
        if(Math.abs(diff-g)<=0.01) continue;
        // 特殊1：F列含逗号
        const fVal=s(rc(rows,i,5));
        const commas=(fVal.match(/[,，]/g)||[]).length;
        if(commas>0&&Math.abs((commas+1)*diff-g)<0.01) continue;
        // 特殊2：diff==0 且 G==1 且 E含住3/4小时
        if(diff===0&&Math.abs(g-1)<0.01){
          const e=s(rc(rows,i,4));
          if(e.includes('住3小时')||e.includes('住4小时')) continue;
        }
        errors.push({rn:84,sheet:sheetName,msg:`第<strong>${i+1}</strong>行(D列-C列)=${diff}天，不等于G列值${g}`});
      }
    }

  }catch(e){ errors.push({rn:82,sheet:sheetName,msg:`运行错误：${e.message}`}); }
  return errors;
}

// ═══════════════════════════════════════════════════════════════
// 飞猪表（规则 35-49, 85）
// ═══════════════════════════════════════════════════════════════
function checkFeizhu(rows, filename, sheetName) {
  const errors=[];
  const [year,month]=extractYM(filename);
  const yv=getYValue(filename);

  const cut=checkEmptyRows(rows,sheetName,49,errors);
  if(cut>=0) rows=rows.slice(0,cut);
  const n=rows.length;

  try{
    // 规则35：C列(2)重复值，过滤空值和''
    const cMap=findDuplicates(rows,2,1,v=>v!==null&&v!==undefined&&s(v)!=='');
    for(const[val,excelRows] of Object.entries(cMap)){
      errors.push({rn:35,sheet:sheetName,msg:`C列第<strong>${excelRows.join(', ')}</strong>行存在重复值：${val}`});
    }

    // 规则36：E列(4)第2行年月检查
    if(year&&month){
      const e2=toDate(rc(rows,1,4));
      if(e2&&(e2.getFullYear()!==year||e2.getMonth()+1!==month)) errors.push({rn:36,sheet:sheetName,msg:`<strong>E2</strong>单元格年月应为${year}年${String(month).padStart(2,'0')}月`});
    }

    // 规则37：E列日期（递增+当月）
    const colE=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,4));if(d) colE.push({d,i});}
    if(colE.length>0&&year&&month){
      for(let i=1;i<colE.length;i++){
        if(dateLT(colE[i].d,colE[i-1].d)){errors.push({rn:37,sheet:sheetName,msg:`E列第<strong>${colE[i].i+1}</strong>行日期早于第<strong>${colE[i-1].i+1}</strong>行`});break;}
      }
      for(const{d,i} of colE){
        if(d.getFullYear()!==year||d.getMonth()+1!==month){errors.push({rn:37,sheet:sheetName,msg:`E列第<strong>${i+1}</strong>行包含非当月日期：${fmtDateCN(d)}`});break;}
      }
    }

    // 规则38：F列(5)日期
    const colF=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,5));if(d) colF.push({d,i});}
    if(colF.length>0&&year&&month){
      const nmf=nextMonthFirst(year,month);
      if(!dateEq(norm(colF[colF.length-1].d),nmf)) errors.push({rn:38,sheet:sheetName,msg:`F列最后一行应为次月第一天`});
      for(let k=0;k<colF.length-1;k++){
        const{d,i}=colF[k];
        if((d.getFullYear()===year&&d.getMonth()+1===month)||dateEq(norm(d),nmf)) continue;
        errors.push({rn:38,sheet:sheetName,msg:`<strong>F${i+1}</strong>包含非法日期`}); break;
      }
    }

    // 规则39：F日期早于E
    for(let i=1;i<n;i++){
      const e=toDate(rc(rows,i,4)), f=toDate(rc(rows,i,5));
      if(e&&f&&dateLT(f,e)) errors.push({rn:39,sheet:sheetName,msg:`第<strong>${i+1}</strong>行F列日期早于E列日期`});
    }

    // 规则40：G列(6)>7
    {const ov=[];for(let i=1;i<n;i++){const g=toNum(rc(rows,i,6));if(!isNaN(g)&&g>7)ov.push(i+1);}
    if(ov.length>0) errors.push({rn:40,sheet:sheetName,msg:`G列存在大于7的数值`});}

    // 规则41-43：H/I/J倒数第二行求和
    for(const[ci,lbl,rn] of [[7,'H',41],[8,'I',42],[9,'J',43]]){
      const col=[];for(let i=0;i<n;i++) col.push(toNum(rc(rows,i,ci)));
      if(n>2){let s=0;for(let i=1;i<=n-3;i++)if(!isNaN(col[i]))s+=col[i];
      const a=col[n-2];if(!isNaN(a)&&Math.abs(s-a)>0.01) errors.push({rn,sheet:sheetName,msg:`${lbl}列倒数第二行求和错误`});}
    }

    // 规则44：I+J==H（倒数第二行）
    if(n>2){
      const h=toNum(rc(rows,n-2,7)), iv=toNum(rc(rows,n-2,8)), j=toNum(rc(rows,n-2,9));
      if(!isNaN(h)&&!isNaN(iv)&&!isNaN(j)&&Math.abs((iv+j)-h)>0.01) errors.push({rn:44,sheet:sheetName,msg:`I列倒数第二行+J列倒数第二行≠H列倒数第二行`});
    }

    // 规则45：佣金比例 I/H in [0.10,0.11]
    if(n>2){
      const h=toNum(rc(rows,n-2,7)), iv=toNum(rc(rows,n-2,8));
      if(!isNaN(h)&&!isNaN(iv)&&h!==0){const r=iv/h;if(r<0.10||r>0.11) errors.push({rn:45,sheet:sheetName,msg:`佣金比例${r.toFixed(4)}不在0.10-0.11范围内`});}
    }

    // 规则46：G列(6)负数
    {const neg=[];for(let i=1;i<n;i++){const g=toNum(rc(rows,i,6));if(!isNaN(g)&&g<0)neg.push(i+1);}
    if(neg.length>0) errors.push({rn:46,sheet:sheetName,msg:`G列存在负数，行号：<strong>${neg.join(', ')}</strong>`});}

    // 规则47：I列(8)负数
    {const neg=[];for(let i=1;i<n;i++){const v=toNum(rc(rows,i,8));if(!isNaN(v)&&v<0)neg.push(i+1);}
    if(neg.length>0) errors.push({rn:47,sheet:sheetName,msg:`I列存在负数，行号：<strong>${neg.join(', ')}</strong>`});}

    // 规则48：J/G >= Y
    for(let i=1;i<n;i++){
      const j=toNum(rc(rows,i,9)), g=toNum(rc(rows,i,6));
      if(!isNaN(j)&&!isNaN(g)&&g!==0&&j/g<yv) errors.push({rn:48,sheet:sheetName,msg:`第<strong>${i+1}</strong>行J列÷G列=${(j/g).toFixed(2)}，低于阈值${yv}`});
    }

    // 规则85：(F-E).days == G
    if(n>3){
      for(let i=1;i<=n-3;i++){
        const e=toDate(rc(rows,i,4)), f=toDate(rc(rows,i,5));
        const g=toNum(rc(rows,i,6));
        if(!e||!f||isNaN(g)) continue;
        const diff=Math.round((norm(f)-norm(e))/86400000);
        if(Math.abs(diff-g)>0.01) errors.push({rn:85,sheet:sheetName,msg:`第<strong>${i+1}</strong>行(F列-E列)=${diff}天，不等于G列值${g}`});
      }
    }

  }catch(e){ errors.push({rn:82,sheet:sheetName,msg:`运行错误：${e.message}`}); }
  return errors;
}

// ═══════════════════════════════════════════════════════════════
// 抖音表（规则 50-64）
// ═══════════════════════════════════════════════════════════════
function checkDouyin(rows, filename, sheetName) {
  const errors=[];
  const [year,month]=extractYM(filename);
  const yv=getYValue(filename);

  const cut=checkEmptyRows(rows,sheetName,64,errors);
  if(cut>=0) rows=rows.slice(0,cut);
  const n=rows.length;

  try{
    // 规则50：A列(0)重复值
    const aMap=findDuplicates(rows,0,1,null);
    for(const[val,excelRows] of Object.entries(aMap)){
      errors.push({rn:50,sheet:sheetName,msg:`A列第<strong>${excelRows.join(', ')}</strong>行存在重复值：${val}`});
    }

    // 规则51：D列(3)第2行是当月第一天
    if(year&&month){
      const d2=toDate(rc(rows,1,3));
      const fd=new Date(year,month-1,1);
      if(!d2||!dateEq(d2,fd)) errors.push({rn:51,sheet:sheetName,msg:`<strong>D2</strong>单元格应为${year}年${String(month).padStart(2,'0')}月01日`});
    }

    // 规则52：D列日期（递增+完整月份+最后一天+全当月）
    const colD=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,3));if(d) colD.push({d,i});}
    if(colD.length>0&&year&&month){
      for(let i=1;i<colD.length;i++){
        if(dateLT(colD[i].d,colD[i-1].d)){errors.push({rn:52,sheet:sheetName,msg:`D列第<strong>${colD[i].i+1}</strong>行日期早于第<strong>${colD[i-1].i+1}</strong>行`});break;}
      }
      const dim=daysInMonth(year,month);
      const exp=new Set(); for(let d=1;d<=dim;d++) exp.add(new Date(year,month-1,d).getTime());
      const act=new Set(colD.map(e=>norm(e.d).getTime()));
      const miss=[...exp].filter(t=>!act.has(t)).map(t=>new Date(t));
      if(miss.length>0) errors.push({rn:52,sheet:sheetName,msg:`D列缺少当月日期：${miss.sort((a,b)=>a-b).map(d=>d.getDate()+'日').join(', ')}`});
      const ld=new Date(year,month-1,dim);
      if(!dateEq(norm(colD[colD.length-1].d),ld)) errors.push({rn:52,sheet:sheetName,msg:`D列最后一行应为当月最后一天`});
      for(const{d} of colD){if(d.getFullYear()!==year||d.getMonth()+1!==month){errors.push({rn:52,sheet:sheetName,msg:`D列包含非当月日期`});break;}}
    }

    // 规则53：E列(4)日期
    const colE=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,4));if(d) colE.push({d,i});}
    if(colE.length>0&&year&&month){
      const nmf=nextMonthFirst(year,month);
      if(!dateEq(norm(colE[colE.length-1].d),nmf)) errors.push({rn:53,sheet:sheetName,msg:`E列最后一行应为次月第一天`});
      for(let k=0;k<colE.length-1;k++){
        const{d,i}=colE[k];
        if((d.getFullYear()===year&&d.getMonth()+1===month)||dateEq(norm(d),nmf)) continue;
        errors.push({rn:53,sheet:sheetName,msg:`<strong>E${i+1}</strong>包含非法日期`}); break;
      }
    }

    // 规则54：E日期早于D
    for(let i=1;i<=Math.min(colD.length,colE.length);i++){
      const d=toDate(rc(rows,i,3)), e=toDate(rc(rows,i,4));
      if(d&&e&&dateLT(e,d)) errors.push({rn:54,sheet:sheetName,msg:`第<strong>${i+1}</strong>行E列日期早于D列日期`});
    }

    // 规则55-57：F/G/H倒数第二行求和
    for(const[ci,lbl,rn] of [[5,'F',55],[6,'G',56],[7,'H',57]]){
      const col=[];for(let i=0;i<n;i++) col.push(toNum(rc(rows,i,ci)));
      if(n>2){let s=0;for(let i=1;i<=n-3;i++)if(!isNaN(col[i]))s+=col[i];
      const a=col[n-2];if(!isNaN(a)&&Math.abs(s-a)>0.01) errors.push({rn,sheet:sheetName,msg:`${lbl}列倒数第二行求和错误`});}
    }

    // 规则58：G+H==F（倒数第二行）
    if(n>2){
      const f=toNum(rc(rows,n-2,5)), g=toNum(rc(rows,n-2,6)), h=toNum(rc(rows,n-2,7));
      if(!isNaN(f)&&!isNaN(g)&&!isNaN(h)&&Math.abs((g+h)-f)>0.01) errors.push({rn:58,sheet:sheetName,msg:`G列倒数第二行+H列倒数第二行≠F列倒数第二行`});
    }

    // 规则59：佣金比例 G/F in [0.08,0.09]
    if(n>2){
      const f=toNum(rc(rows,n-2,5)), g=toNum(rc(rows,n-2,6));
      if(!isNaN(f)&&!isNaN(g)&&f!==0){const r=g/f;if(r<0.08||r>0.09) errors.push({rn:59,sheet:sheetName,msg:`佣金比例${r.toFixed(4)}不在0.08-0.09范围内`});}
    }

    // 规则60-62：F/G/H负数
    for(const[ci,lbl,rn] of [[5,'F',60],[6,'G',61],[7,'H',62]]){
      const neg=[];for(let i=1;i<n;i++){const v=toNum(rc(rows,i,ci));if(!isNaN(v)&&v<0)neg.push(i+1);}
      if(neg.length>0) errors.push({rn,sheet:sheetName,msg:`${lbl}列存在负数`});
    }

    // 规则63：H/天数 >= Y
    for(let i=1;i<n;i++){
      const h=toNum(rc(rows,i,7));
      const d=toDate(rc(rows,i,3)), e=toDate(rc(rows,i,4));
      if(!isNaN(h)&&d&&e){
        const days=Math.round((norm(e)-norm(d))/86400000);
        if(days>0&&h/days<yv) errors.push({rn:63,sheet:sheetName,msg:`第<strong>${i+1}</strong>行H列÷天数=${(h/days).toFixed(2)}，低于阈值${yv}`});
      }
    }

  }catch(e){ errors.push({rn:82,sheet:sheetName,msg:`运行错误：${e.message}`}); }
  return errors;
}

// ═══════════════════════════════════════════════════════════════
// 直销汇总表（规则 65-80）
// ═══════════════════════════════════════════════════════════════
function checkSummary(rows, filename, sheetName) {
  const errors=[];
  const [year,month]=extractYM(filename);
  const yv=getYValue(filename);
  let bookingRevenue=0;

  const cut=checkEmptyRows(rows,sheetName,80,errors);
  if(cut>=0) rows=rows.slice(0,cut);
  const n=rows.length;

  try{
    // 规则65：A列(0)重复值，排除n.a/n/a/nan/''
    const EXCL=new Set(['n.a','n/a','na','nan','']);
    const aMap=findDuplicates(rows,0,1,v=>!EXCL.has(s(v).toLowerCase()));
    for(const[val,excelRows] of Object.entries(aMap)){
      errors.push({rn:65,sheet:sheetName,msg:`A列第<strong>${excelRows.join(', ')}</strong>行存在重复值：${val}（排除n.a等）`});
    }

    // 规则66：B列(1)第3行年月检查（index=2）
    if(year&&month&&n>2){
      const b3=toDate(rc(rows,2,1));
      if(b3&&(b3.getFullYear()!==year||b3.getMonth()+1!==month)) errors.push({rn:66,sheet:sheetName,msg:`<strong>B3</strong>单元格年月应为${year}年${String(month).padStart(2,'0')}月`});
    }

    // 规则67：B列从第3行（index=2）开始，递增+当月
    const colB=[];
    for(let i=2;i<n;i++){const d=toDate(rc(rows,i,1));if(d) colB.push({d,i});}
    if(colB.length>0&&year&&month){
      for(let i=1;i<colB.length;i++){
        if(dateLT(colB[i].d,colB[i-1].d)){errors.push({rn:67,sheet:sheetName,msg:`B列第<strong>${colB[i].i+1}</strong>行日期早于第<strong>${colB[i-1].i+1}</strong>行`});break;}
      }
      for(const{d,i} of colB){
        if(d.getFullYear()!==year||d.getMonth()+1!==month){errors.push({rn:67,sheet:sheetName,msg:`B列第<strong>${i+1}</strong>行包含非当月日期`});break;}
      }
    }

    // 规则68：C列(2)日期（最后一行=次月第一天，其他行=当月或次月第一天）
    const colC=[];
    for(let i=1;i<n;i++){const d=toDate(rc(rows,i,2));if(d) colC.push({d,i});}
    if(colC.length>0&&year&&month){
      const nmf=nextMonthFirst(year,month);
      if(!dateEq(norm(colC[colC.length-1].d),nmf)) errors.push({rn:68,sheet:sheetName,msg:`C列最后一行应为次月第一天${fmtDateCN(nmf)}`});
      for(let k=0;k<colC.length-1;k++){
        const{d,i}=colC[k];
        if((d.getFullYear()===year&&d.getMonth()+1===month)||dateEq(norm(d),nmf)) continue;
        errors.push({rn:68,sheet:sheetName,msg:`<strong>C${i+1}</strong>包含非法日期：${fmtDateCN(d)}（应为当月或次月第一天）`}); break;
      }
    }

    // 规则69：C日期早于B（从第3行index=2开始）
    for(let i=2;i<n;i++){
      const b=toDate(rc(rows,i,1)), c=toDate(rc(rows,i,2));
      if(b&&c&&dateLT(c,b)) errors.push({rn:69,sheet:sheetName,msg:`第<strong>${i+1}</strong>行C列日期早于B列日期`});
    }

    // 找合计行（含"合计"文字）
    let totalIdx=-1;
    for(let i=1;i<n;i++){
      const row=rows[i];
      if(row&&row.some(v=>s(v).includes('合计'))){ totalIdx=i; break; }
    }

    // 规则70-76：合计行各列求和
    const totals={};
    if(totalIdx>=0){
      for(const[ci,lbl,rn] of [[6,'G',70],[7,'H',71],[8,'I',72],[9,'J',73],[10,'K',74],[11,'L',75],[12,'M',76]]){
        let ss=0;
        for(let i=1;i<totalIdx;i++){const v=toNum(rc(rows,i,ci));if(!isNaN(v))ss+=v;}
        const a=toNum(rc(rows,totalIdx,ci));
        totals[lbl]=a;
        if(!isNaN(a)&&Math.abs(ss-a)>0.01) errors.push({rn,sheet:sheetName,msg:`${lbl}列合计行求和错误，应为${ss.toFixed(2)}，实际为${a.toFixed(2)}`});
      }
      // 规则77：H到M之和==G
      const needed=['G','H','I','J','K','L','M'];
      if(needed.every(k=>k in totals&&!isNaN(totals[k]))){
        const sum=['H','I','J','K','L','M'].reduce((a,k)=>a+totals[k],0);
        if(Math.abs(sum-totals['G'])>0.01) errors.push({rn:77,sheet:sheetName,msg:`H到M列合计之和(${sum.toFixed(2)})≠G列合计(${totals['G'].toFixed(2)})`});
      }
    }

    // 规则78：E列(4)含BOOKING，累计G列(6)
    for(let i=1;i<n;i++){
      if(s(rc(rows,i,4)).toUpperCase().includes('BOOKING')){
        const g=toNum(rc(rows,i,6));if(!isNaN(g)) bookingRevenue+=g;
      }
    }

    // 规则79：N列(13)含"直销"，G/天数 >= Y（从第3行index=2开始）
    for(let i=2;i<n;i++){
      const nv=s(rc(rows,i,13));
      if(!nv.includes('直销')) continue;
      const g=toNum(rc(rows,i,6));
      const b=toDate(rc(rows,i,1)), c=toDate(rc(rows,i,2));
      if(!isNaN(g)&&b&&c){
        const days=Math.round((norm(c)-norm(b))/86400000);
        if(days>0&&g/days<yv) errors.push({rn:79,sheet:sheetName,msg:`第<strong>${i+1}</strong>行直销订单客单价${(g/days).toFixed(2)}低于阈值${yv}`});
      }
    }

  }catch(e){ errors.push({rn:82,sheet:sheetName,msg:`运行错误：${e.message}`}); }
  return {errors, bookingRevenue};
}

// ═══════════════════════════════════════════════════════════════
// 钟点房统计
// ═══════════════════════════════════════════════════════════════
function calcHourly(wb){
  let aa=0,bb=0,cc=0,dd=0;
  try{
    const xs=wb.Sheets['携程'];
    if(xs){
      const rows=XLSX.utils.sheet_to_json(xs,{header:1,defval:null,raw:true});
      for(let i=1;i<rows.length;i++){
        if(s(rows[i]?.[3]).includes('钟点房')){
          const g=toNum(rows[i]?.[6]), k=toNum(rows[i]?.[10]);
          if(!isNaN(g))aa+=g; if(!isNaN(k))bb+=k;
        }
      }
    }
    const ms=wb.Sheets['美团'];
    if(ms){
      const rows=XLSX.utils.sheet_to_json(ms,{header:1,defval:null,raw:true});
      for(let i=1;i<rows.length;i++){
        const e=s(rows[i]?.[4]);
        if(e.includes('住3小时')||e.includes('住4小时')){
          const g=toNum(rows[i]?.[6]), j=toNum(rows[i]?.[9]);
          if(!isNaN(g))cc+=g; if(!isNaN(j))dd+=j;
        }
      }
    }
  }catch(e){}
  return {totalRooms:aa+cc, totalRevenue:bb+dd};
}

// ═══════════════════════════════════════════════════════════════
// 主检查流程
// ═══════════════════════════════════════════════════════════════
function checkFile(wb, filename){
  const result={filename, errors:[], sheetsChecked:[], sheetsMissing:[], bookingRevenue:0, hourly:{totalRooms:0,totalRevenue:0}};
  const sheetNames=wb.SheetNames;
  const EXPECTED=['携程','美团','飞猪','抖音','直销、升级、延时房费汇总'];

  // 规则81：多余工作表
  const extra=sheetNames.filter(s=>!EXPECTED.includes(s)&&s!=='OTAPVtable'&&s!=='早餐金额汇总'&&s!=='早餐统计');
  if(extra.length>0) result.errors.push({rn:81,sheet:'整个文件',msg:`存在多余的工作表：${extra.join(', ')}`});

  const readRows=sn=>{
    const ws=wb.Sheets[sn];
    // raw:true 保留原始数值，避免浮点精度损失
    return XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
  };

  for(const sn of EXPECTED){
    if(!sheetNames.includes(sn)){
      result.sheetsMissing.push(sn);
      result.errors.push({rn:81,sheet:'整个文件',msg:`缺少必需的工作表：${sn}`});
      continue;
    }
    try{
      const rows=readRows(sn);
      let errs;
      if(sn==='携程')      errs=checkXiecheng(rows,filename,sn);
      else if(sn==='美团') errs=checkMeituan(rows,filename,sn);
      else if(sn==='飞猪') errs=checkFeizhu(rows,filename,sn);
      else if(sn==='抖音') errs=checkDouyin(rows,filename,sn);
      else { const r=checkSummary(rows,filename,sn); errs=r.errors; result.bookingRevenue=r.bookingRevenue; }
      result.errors.push(...errs);
      result.sheetsChecked.push(sn);
    }catch(e){
      result.errors.push({rn:82,sheet:sn,msg:`无法处理工作表：${e.message}`});
    }
  }
  result.hourly=calcHourly(wb);
  return result;
}

function buildReportHTML(results, forDownload=false) {
  const now=new Date();
  const timeStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const totalErrors=results.reduce((s,r)=>s+r.errors.length,0);
  const SHEET_ORDER=['携程','美团','飞猪','抖音','直销、升级、延时房费汇总','整个文件','文件读取'];

  let body=`<div class="header">
<h1>📊 财务报表检查报告</h1>
<div class="summary-grid">
<div class="summary-card"><h3>检查时间</h3><div class="value">${timeStr}</div></div>
<div class="summary-card"><h3>检查文件数</h3><div class="value">${results.length}</div></div>
<div class="summary-card"><h3>总错误数</h3><div class="value">${totalErrors}</div></div>
<div class="summary-card"><h3>检查规则数</h3><div class="value">85</div></div>
</div></div>`;

  for(const r of results){
    const ec=r.errors.length;
    body+=`<div class="file-section"><div class="file-header"><h2>📁 ${r.filename} <span class="file-badge">${ec} 个问题</span></h2></div>
<div class="booking-revenue">💰 BOOKING渠道房费收入：¥${r.bookingRevenue.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}<br>
🏨 本月本项目钟点房合计：${r.hourly.totalRooms.toFixed(0)} 单，实收房费${r.hourly.totalRevenue.toFixed(2)}元</div>`;

    if(ec===0){
      body+=`<div class="success-msg">✅ 所有检查项已通过，未发现问题！</div>`;
    } else {
      const bySheet={};
      for(const e of r.errors){ if(!bySheet[e.sheet]) bySheet[e.sheet]=[]; bySheet[e.sheet].push(e); }
      for(const sn of SHEET_ORDER){
        if(bySheet[sn]){
          body+=`<div class="sheet-section"><div class="sheet-header"><h3>📋 ${sn}</h3><span class="error-count">${bySheet[sn].length} 个错误</span></div><ul class="error-list">`;
          for(const e of bySheet[sn]){
            const cls=getErrClass(e.rn);
            body+=`<li class="error-item ${cls}"><span class="error-rule ${cls}">规则 ${e.rn}</span><span class="error-msg">${e.msg}</span></li>`;
          }
          body+=`</ul></div>`;
        } else if(['携程','美团','飞猪','抖音','直销、升级、延时房费汇总'].includes(sn)&&r.sheetsChecked.includes(sn)){
          body+=`<div class="sheet-section"><div class="sheet-header"><h3>📋 ${sn}</h3><span class="success-count">✓ 通过</span></div></div>`;
        }
      }
    }
    body+=`</div>`;
  }

  body+=`<div class="footer"><p>报告生成时间：${timeStr}</p><p>© 2025 财务报表自动检查系统 V20250811</p></div>`;

  if(forDownload){
    return `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>财务报表检查报告</title><style>${REPORT_CSS}</style></head><body><div class="container">${body}</div></body></html>`;
  }
  return body;
}

function renderInPage(results){

  styleEl.textContent=REPORT_CSS.replace(/body\{[^}]+\}/,'').replace(/\.container\{[^}]+\}/,'');

let selectedFiles=[];

const fileInput=document.getElementById('fileInput');

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));

function addFiles(list){
  for(const f of list){
    if(!f.name.match(/\.xlsx?$/i)) continue;
    if(!selectedFiles.find(x=>x.name===f.name)) selectedFiles.push(f);
  }
  renderList();
}
function renderList(){
  fileList.innerHTML=selectedFiles.map((f,i)=>`<div class="file-tag"><span>📄</span><span class="name">${f.name}</span><span class="sz">${(f.size/1024).toFixed(0)} KB</span><span class="rm" onclick="rm(${i})">×</span></div>`).join('');
  btnRun.disabled=selectedFiles.length===0;
}
function rm(i){ selectedFiles.splice(i,1); renderList(); }

// 按附件编号排序（附件1 < 附件2 < 附件3）
function sortByAttachment(files){
  return [...files].sort((a,b)=>{
    const getNum=fn=>{const m=fn.match(/附件(\d+)/);return m?+m[1]:999;};
    return getNum(a.name)-getNum(b.name);
  });
}

// 从文件名提取项目名称
function extractProjectName(filenames){
  const keywords=['英利','联合国际','世茂','百扬','光控','盈嘉','未来中心'];
  for(const fn of filenames){
    for(const kw of keywords){ if(fn.includes(kw)) return kw; }
  }
  return '未知项目';
}

// 生成与原 Python 脚本一致的文件名：财务附件检查报告_项目名_YYYYMMDD_HHMMSS.html
function buildFilename(results){
  const projectName=extractProjectName(results.map(r=>r.filename));
  const now=new Date();
  const date=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const time=`${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
  return `财务附件检查报告_${projectName}_${date}_${time}.html`;
}

btnRun.addEventListener('click',async()=>{
  if(!selectedFiles.length) return;
  btnRun.disabled=true;
  progressEl.style.display='block';
  reportDiv.innerHTML='';
  const results=[];
  // 按附件编号排序后再检查
  const sortedFiles=sortByAttachment(selectedFiles);
  for(let i=0;i<sortedFiles.length;i++){
    const f=sortedFiles[i];
    progressFill.style.width=`${Math.round(i/sortedFiles.length*90)}%`;
    progressText.textContent=`正在检查：${f.name}（${i+1}/${sortedFiles.length}）`;
    try{
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array',cellDates:false,raw:true});
      results.push(checkFile(wb,f.name));
    }catch(e){
      results.push({filename:f.name,errors:[{rn:82,sheet:'文件读取',msg:`无法读取文件：${e.message}`}],sheetsChecked:[],sheetsMissing:[],bookingRevenue:0,hourly:{totalRooms:0,totalRevenue:0}});
    }
  }
  progressFill.style.width='100%';
  progressText.textContent='检查完成！';

  // 导出按钮放在报告最顶部
  const dlBar=document.createElement('div');
  dlBar.className='download-bar';
  dlBar.innerHTML=`<p>报告已生成，点击右侧按钮下载独立 HTML 文件</p><button class="btn-dl" id="btnDl">📥 导出报告 HTML</button>`;
  reportDiv.appendChild(dlBar);

  document.getElementById('btnDl').addEventListener('click',()=>{
    const html=buildReportHTML(results,true);
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download=buildFilename(results);
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
  });

  reportDiv.appendChild(renderInPage(results));

  btnRun.disabled=false;
  setTimeout(()=>{progressEl.style.display='none';},1500);
});
</script>
</body>
</html>
